name: Archlytics
description: Run architecture analysis on Java pull requests and post a summary comment
branding:
  icon: git-merge
  color: blue

inputs:
  path:
    description: Path to the Java repository root
    required: false
    default: .
  base-ref:
    description: Base git ref for PR comparison (defaults to PR base SHA in pull_request events)
    required: false
    default: ''
  head-ref:
    description: Head git ref for PR comparison
    required: false
    default: HEAD
  fail-on:
    description: Fail the check if introduced violations meet severity (none, low, medium, high)
    required: false
    default: high
  skip-ai:
    description: Skip AI analysis (recommended for CI)
    required: false
    default: 'true'
  groq-api-key:
    description: Groq API key for AI analysis (optional)
    required: false
  gemini-api-key:
    description: Gemini API key for AI analysis (optional)
    required: false
  comment:
    description: Post analysis summary as a PR comment
    required: false
    default: 'true'
  token:
    description: GitHub token for PR comments
    required: false

outputs:
  health-score:
    description: Architecture health score (0-100)
    value: ${{ steps.run.outputs.health-score }}
  introduced-violations:
    description: Number of violations introduced by the PR
    value: ${{ steps.run.outputs.introduced-violations }}
  report-path:
    description: Path to the generated markdown report
    value: ${{ steps.run.outputs.report-path }}
  comment-path:
    description: Path to the generated PR comment markdown
    value: ${{ steps.run.outputs.comment-path }}

runs:
  using: composite
  steps:
    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Build Archlytics
      shell: bash
      run: mvn -q package -DskipTests
      working-directory: ${{ github.action_path }}/..

    - name: Resolve base ref
      id: refs
      shell: bash
      run: |
        BASE="${{ inputs.base-ref }}"
        if [ -z "$BASE" ] && [ -n "${{ github.event.pull_request.base.sha }}" ]; then
          BASE="${{ github.event.pull_request.base.sha }}"
        fi
        if [ -z "$BASE" ]; then
          BASE="origin/main"
        fi
        echo "base=$BASE" >> "$GITHUB_OUTPUT"

    - name: Run Archlytics
      id: run
      shell: bash
      env:
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        AI_PROVIDER: groq
      run: |
        chmod +x "${{ github.action_path }}/run.sh"
        "${{ github.action_path }}/run.sh" \
          "${{ inputs.path }}" \
          "${{ steps.refs.outputs.base }}" \
          "${{ inputs.head-ref }}" \
          "${{ inputs.fail-on }}" \
          "${{ inputs.skip-ai }}" \
          "$RUNNER_TEMP/archlytics-report.md" \
          "$RUNNER_TEMP/archlytics-pr-comment.md" \
          "${{ github.action_path }}/../target/archlytics-0.1.0-SNAPSHOT.jar"

    - name: Post PR comment
      if: always() && inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        COMMENT_PATH: ${{ steps.run.outputs.comment-path }}
      with:
        github-token: ${{ inputs.token || github.token }}
        script: |
          const fs = require('fs');
          const path = process.env.COMMENT_PATH;
          if (!path || !fs.existsSync(path)) {
            core.info('No PR comment file found — skipping');
            return;
          }
          const body = fs.readFileSync(path, 'utf8');
          const marker = '<!-- archlytics-report -->';
          const tagged = marker + '\n' + body;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: tagged,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: tagged,
            });
          }

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: archlytics-report
        path: ${{ steps.run.outputs.report-path }}
        if-no-files-found: ignore
